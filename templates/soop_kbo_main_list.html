{% extends "base.html" %}
{% block content %}

<div>
  {{ macros.m_button_group([['list_reload_btn', '새로고침']])}}
  <p class="mt-2 mb-1 text-sm small text-muted">마지막 업데이트: <span id="list_info">없음</span></p>
  <div id="list_div" class="mb-3">
    <table id="result_table" class="table table-sm table-striped table-hover">
      <thead class="thead-dark">
        <tr>
          <th style="text-align:left;">채널</th>
          <th style="text-align:left;">경기</th>
          <th style="width:120px; text-align:center;">Play</th>
        </tr>
      </thead>
      <tbody id="channel-list">
        <template id="channel-template">
          <tr>
            <td style="text-align:left;" id="ch-name"></td>
            <td style="text-align:left;" id="ch-program"></td>
            <td style="width:120px; text-align:center;" id="ch-play"></td>
          </tr>
        </template>
      </tbody>
    </table>
  </div>
</div>

<script type="text/javascript">
$(document).ready(function(){
  load_channel_list();
});

function load_channel_list() {
  $('#channel-list').html('<tr><td colspan="3">로딩중...</td></tr>');
  $.ajax({
    url: `/${PACKAGE_NAME}/ajax/channel_list`,
    type: "POST",
    cache: false,
    dataType: "json",
    success: function(data) {
      $('#list_info').text(new Date(data.updated_at).toLocaleString());
      if (data.error) {
        $.notify('채널 목록 조회 경고: ' + data.error, {type:'warning'});
      }
      make_channel_list(data.list);
    },
    error: function(xhr) {
      $('#list_info').text('조회 실패');
      $('#channel-list').html('<tr><td colspan="3">조회 실패 (로그 확인)</td></tr>');
      $.notify('채널 목록 조회 실패: ' + xhr.status, {type:'danger'});
    }
  });
}

$("body").on('click', '#list_reload_btn', function(e){
  e.preventDefault();
  load_channel_list();
});

function make_channel_list(data) {
  var scroller = document.querySelector('#channel-list');
  scroller.querySelectorAll('tr').forEach(e => e.remove());
  if (!data || data.length === 0) {
    scroller.insertAdjacentHTML('beforeend', '<tr><td colspan="3">채널 없음</td></tr>');
    return;
  }
  var tmpl = document.querySelector('#channel-template');
  data.forEach(function(item) {
    var clone = tmpl.content.cloneNode(true);
    clone.querySelector('#ch-name').textContent = item.channel_id;
    clone.querySelector('#ch-program').textContent = (item.program && item.program.title) ? item.program.title : '-';
    var url = `/${PACKAGE_NAME}/channel/${item.channel_id}.m3u8`;
    clone.querySelector('#ch-play').innerHTML =
      '<a href="' + url + '" target="_blank" rel="noopener noreferrer" class="btn btn-sm btn-secondary">새탭</a>';
    scroller.appendChild(clone);
  });
}
</script>
{% endblock %}
