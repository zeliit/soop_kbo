{% extends "base.html" %}
{% block content %}

<div>
  {{ macros.m_button_group([['list_reload_btn', '새로고침']])}}
  <p class="mt-2 mb-1 text-sm small text-muted">마지막 업데이트: <span id="list_info">없음</span></p>
  <div id="list_div" class="mb-3">
    <table id="result_table" class="table table-sm table-striped table-hover">
      <thead class="thead-dark">
        <tr>
          <th style="text-align:left;">채널</th>
          <th style="text-align:left;">경기</th>
          <th style="width:120px; text-align:center;">Play</th>
        </tr>
      </thead>
      <tbody id="channel-list">
      </tbody>
    </table>
  </div>
</div>

<script type="text/javascript">
$(document).ready(function(){
  load_channel_list();
});

function load_channel_list() {
  $('#channel-list').html('<tr><td colspan="3">로딩중...</td></tr>');
  $.ajax({
    url: `/${PACKAGE_NAME}/ajax/channel_list`,
    type: "POST",
    cache: false,
    dataType: "json",
    success: function(data) {
      if (data && data.updated_at) {
        $('#list_info').text(new Date(data.updated_at).toLocaleString());
      } else {
        $('#list_info').text('조회됨');
      }
      if (data && data.error) {
        $.notify('채널 목록 조회 경고: ' + data.error, {type:'warning'});
      }
      make_channel_list((data && data.list) ? data.list : make_waiting_rows());
    },
    error: function(xhr, status) {
      $('#list_info').text('조회 실패');
      make_channel_list(make_waiting_rows());
      $.notify('채널 목록 조회 실패: ' + xhr.status + ' / ' + status, {type:'danger'});
    }
  });
}

$("body").on('click', '#list_reload_btn', function(e){
  e.preventDefault();
  load_channel_list();
});

function make_channel_list(data) {
  var tbody = document.getElementById('channel-list');
  if (!data || data.length === 0) {
    tbody.innerHTML = '<tr><td colspan="3">채널 없음</td></tr>';
    return;
  }
  var rows = '';
  data.forEach(function(item) {
    var ch_id = item.channel_id || '';
    var title = (item.program && item.program.title) ? item.program.title : '대기중';
    var url = '/' + PACKAGE_NAME + '/channel/' + ch_id + '.m3u8';
    rows += '<tr>';
    rows += '<td style="text-align:left;">' + ch_id + '</td>';
    rows += '<td style="text-align:left;">' + title + '</td>';
    rows += '<td style="width:120px; text-align:center;"><a href="' + url + '" target="_blank" rel="noopener noreferrer" class="btn btn-sm btn-secondary">재생</a></td>';
    rows += '</tr>';
  });
  tbody.innerHTML = rows;
}

function make_waiting_rows() {
  var rows = [];
  for (var i = 1; i <= 5; i += 1) {
    rows.push({
      channel_id: 'kboglobal' + i,
      program: { title: '대기중' }
    });
  }
  return rows;
}
</script>
{% endblock %}
